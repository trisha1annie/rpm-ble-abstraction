mapping_id: blood_pressure_observation
fhir_version: R5

source:
  device_type: blood_pressure_monitor
  service_uuid: "1810"
  characteristic_uuid: "2A35"
  characteristic_name: blood_pressure_measurement

target:
  resource_type: Observation

  profile:
    - "http://hl7.org/fhir/StructureDefinition/bp"

  fixed:
    status: final

    category:
      - coding:
          - system: "http://terminology.hl7.org/CodeSystem/observation-category"
            code: "vital-signs"
            display: "Vital Signs"

    code:
      coding:
        - system: "http://loinc.org"
          code: "85354-9"
          display: "Blood pressure panel with all children optional"
      text: "Blood pressure systolic and diastolic"

  dynamic:
    identifier:
      generate: true
      system: "urn:ietf:rfc:3986"
      format: "urn:uuid:{reading_uuid}"

    subject:
      provided_by: rpm_application
      output:
        reference: "Patient/{patient_id}"

    effectiveDateTime:
      source: time_stamp
      fallback: gateway_received_time

components:
  - name: systolic
    source: systolic
    required: true

    code:
      coding:
        - system: "http://loinc.org"
          code: "8480-6"
          display: "Systolic blood pressure"

    value:
      type: Quantity
      path: valueQuantity
      value_source: systolic
      unit_source: flags.blood_pressure_units_kpa

      unit_mapping:
        0:
          unit: "mmHg"
          system: "http://unitsofmeasure.org"
          code: "mm[Hg]"

        1:
          unit: "kPa"
          system: "http://unitsofmeasure.org"
          code: "kPa"

  - name: diastolic
    source: diastolic
    required: true

    code:
      coding:
        - system: "http://loinc.org"
          code: "8462-4"
          display: "Diastolic blood pressure"

    value:
      type: Quantity
      path: valueQuantity
      value_source: diastolic
      unit_source: flags.blood_pressure_units_kpa

      unit_mapping:
        0:
          unit: "mmHg"
          system: "http://unitsofmeasure.org"
          code: "mm[Hg]"

        1:
          unit: "kPa"
          system: "http://unitsofmeasure.org"
          code: "kPa"

  - name: mean_arterial_pressure
    source: mean_arterial_pressure

    # Required by the BLE 2A35 decoder schema,
    # but optional as a supplementary FHIR BP component.
    required_from_decoder: true
    required_by_fhir: false

    code:
      coding:
        - system: "http://loinc.org"
          code: "8478-0"
          display: "Mean blood pressure"

    value:
      type: Quantity
      path: valueQuantity
      value_source: mean_arterial_pressure
      unit_source: flags.blood_pressure_units_kpa

      unit_mapping:
        0:
          unit: "mmHg"
          system: "http://unitsofmeasure.org"
          code: "mm[Hg]"

        1:
          unit: "kPa"
          system: "http://unitsofmeasure.org"
          code: "kPa"

quality_mapping:
  source: measurement_status
  create_if: "flags.measurement_status_present == 1"

  fields:
    body_movement_detected:
      target: note
      create_if: "measurement_status.body_movement_detected == true"
      text: "Body movement was detected during the measurement."

    cuff_too_loose:
      target: note
      create_if: "measurement_status.cuff_too_loose == true"
      text: "The cuff may have been too loose during the measurement."

    irregular_pulse_detected:
      target: note
      create_if: "measurement_status.irregular_pulse_detected == true"
      text: "An irregular pulse was detected during the measurement."

    improper_measurement_position:
      target: note
      create_if: "measurement_status.improper_measurement_position == true"
      text: "Improper measurement position was detected."

validation:
  required_source_fields:
    - systolic
    - diastolic
    - mean_arterial_pressure

  rules:
    - name: reject_nan_systolic
      condition: "is_nan(systolic)"
      action: reject

    - name: reject_nan_diastolic
      condition: "is_nan(diastolic)"
      action: reject

    - name: reject_nan_mean_arterial_pressure
      condition: "is_nan(mean_arterial_pressure)"
      action: reject

    - name: unsupported_pressure_unit
      condition: "flags.blood_pressure_units_kpa not in [0, 1]"
      action: reject